version: '3.8'

# ------------------------------------------------------------------------
# NYC TLC Data Engineering: Deployment Architecture (Airflow)
# ------------------------------------------------------------------------

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.2
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    # Binding the environmental variables exactly as we architected in the python DAG
    - PROJECT_ROOT=/opt/airflow
    - DATA_DIR=/opt/airflow/data
    - ALERT_EMAIL=admin@nyctaxi.com
    # CRITICAL: Pinning to dbt-core==1.9.0 to bypass the infamous 1.11 KeyError bug!
    - _PIP_ADDITIONAL_REQUIREMENTS=duckdb dbt-core==1.9.0 dbt-duckdb==1.9.0
  volumes:
    # Natively mapping local Windows directories cleanly into the Linux container
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - .:/opt/airflow/data

services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: 
      - bash
      - -c
      - |
        # Natively scaffold the Metadata DB and generate a secure local Admin account
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email admin@firmable.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init
